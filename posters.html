<body>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    (function() {
        var inner = document.querySelector('.mobile-project-switcher-inner');
        if (!inner) return;
        // Disable smooth scroll during page-load snap so there's no visible slide
        inner.style.scrollBehavior = 'auto';
        var saved = sessionStorage.getItem('switcherScroll');
        if (saved) inner.scrollLeft = parseInt(saved, 10);
        var active = inner.querySelector('.switcher-link.active');
        if (active) active.scrollIntoView({ inline: 'center', behavior: 'instant' });
        // Re-enable smooth scroll for user gestures after snap is done
        requestAnimationFrame(function() { inner.style.scrollBehavior = ''; });
        inner.querySelectorAll('.switcher-link').forEach(function(link) {
            link.addEventListener('click', function() {
                sessionStorage.setItem('switcherScroll', inner.scrollLeft);
            });
        });
    })();
    </script>
</body>
